<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Prediksi ISPU Jawa Timur</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { 
            background-color: #f4f7f6; /* Warna abu-abu yang lebih lembut/modern */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .ispu-card { 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); /* Efek bayangan diperhalus */
            border: none; 
            background: white; 
        }
        
        /* Search Styling */
        .search-container { max-width: 500px; margin: 0 auto; }
        .input-group-text { border-radius: 10px 0 0 10px; border-right: none; }
        #city-search { border-radius: 0 10px 10px 0; border-left: none; box-shadow: none; }
        #city-search:focus { border-color: #dee2e6; box-shadow: none; }
        
        /* Grid Layout untuk Map & Leaderboard */
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: 2fr 1fr; 
            gap: 20px; 
            margin-bottom: 2rem; 
        }
        
        /* Map Styling */
        /* KOREKSI 2: Menurunkan z-index agar pop-up leaflet tidak menimpa dropdown */
        #map { height: 450px; border-radius: 15px; z-index: 0; } 
        
        /* Leaderboard Styling */
        .leaderboard-section { background: white; padding: 20px; border-radius: 15px; }
        .list-group-item { 
            border: 1px solid #f0f0f0; /* Memberi batas halus antar list */
            padding: 12px 15px; 
            margin-bottom: 8px; 
            border-radius: 10px !important; 
        }
        .badge-ispu { width: 45px; text-align: center; font-size: 0.9rem;}
        
        /* Responsive Grid */
        @media (max-width: 992px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            #map { height: 350px; } /* Peta lebih pendek di HP agar tidak memakan layar */
        }
    </style>
</head>
<body>

<div class="container py-4">
    <header class="text-center mb-4 mt-2">
        <h2 class="fw-bold text-primary"><i class="bi bi-cloud-haze2"></i> ISPU Jawa Timur</h2>
        <p class="text-muted">Sistem Peringatan Dini Kualitas Udara</p>
    </header>

    <div class="card ispu-card mb-4">
        <div class="card-body text-center p-4">
            <div class="search-container">
                <h5 class="mb-3 text-secondary">Cari Lokasi Spesifik:</h5>
                <div class="input-group input-group-lg shadow-sm rounded-3">
                    <span class="input-group-text bg-white"><i class="bi bi-search text-primary"></i></span>
                    <input type="text" id="city-search" class="form-control form-control-lg" list="daftar-kota" placeholder="Ketik Kota / Kabupaten...">
                    <datalist id="daftar-kota">
                        </datalist>
                </div>
                <small class="text-muted mt-3 d-block"><i class="bi bi-geo-alt-fill text-danger"></i> Mencakup 38 wilayah di Jawa Timur</small>
            </div>
        </div>
    </div>

    <div class="dashboard-grid">
        
        <div class="card ispu-card border-0">
            <div class="card-body p-3">
                <h5 class="card-title fw-bold mb-3 px-2"><i class="bi bi-map"></i> Peta Sebaran Polusi (Besok)</h5>
                <div id="map"></div>
            </div>
        </div>

        <div class="card ispu-card border-0">
            <div class="card-body">
                <h5 class="card-title fw-bold mb-4">🏆 Ringkasan Wilayah</h5>
                
                <div class="mb-4">
                    <h6 class="text-danger fw-bold small text-uppercase mb-3"><i class="bi bi-exclamation-triangle-fill"></i> 5 Terburuk (Kritis)</h6>
                    <ul class="list-group list-group-flush" id="list-terburuk">
                        </ul>
                </div>

                <div>
                    <h6 class="text-success fw-bold small text-uppercase mb-3"><i class="bi bi-shield-fill-check"></i> 5 Terbersih (Aman)</h6>
                    <ul class="list-group list-group-flush" id="list-terbersih">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <div id="detail-view">
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card ispu-card text-center text-white shadow" id="statusCard" style="background-color: #6c757d; transition: background-color 0.5s ease;">
                    <div class="card-body py-5">
                        <h5 class="mb-2 text-white-50" id="selectedCityTitle">Pilih Kota untuk Detail</h5>
                        <h1 class="display-3 fw-bold mb-0" id="ispuValue">--</h1>
                        <h3 class="fw-bold text-uppercase mt-2 letter-spacing-1" id="ispuStatus">Menunggu Input...</h3>
                        <p class="mb-0 mt-3 bg-dark bg-opacity-25 d-inline-block px-4 py-2 rounded-pill">
                            <i class="bi bi-moisture"></i> Parameter Kritis: <span id="kritisValue" class="fw-bold text-warning">--</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card ispu-card border-0 mb-5">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
                    <h5 class="card-title fw-bold m-0"><i class="bi bi-graph-up text-primary"></i> Tren Kualitas Udara</h5>
                    
                    <div class="btn-group shadow-sm" role="group">
                        <button type="button" class="btn btn-outline-primary px-4" id="btn-24-jam" onclick="ubahFilterHari('24jam')">24 Jam</button>
                        <button type="button" class="btn btn-outline-primary px-4 active" id="btn-7-hari" onclick="ubahFilterHari(7)">7 Hari</button>
                        <button type="button" class="btn btn-outline-primary px-4" id="btn-30-hari" onclick="ubahFilterHari(30)">30 Hari</button>
                    </div>
                </div>
                <div style="position: relative; height:40vh; width:100%">
                    <canvas id="ispuChart"></canvas>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="app.js"></script>

</body>
</html>
