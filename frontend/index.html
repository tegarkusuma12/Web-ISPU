<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard ISPU Jawa Timur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .ispu-card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-pills .nav-link.active { background-color: #0d6efd; }
        .nav-pills .nav-link { color: #495057; cursor: pointer; margin: 2px; }
    </style>
</head>
<body>

<div class="container py-5">
    <h2 class="text-center mb-4 fw-bold">Peringatan Dini ISPU Jawa Timur</h2>
    
    <div class="card ispu-card mb-4">
        <div class="card-body text-center">
            <h5 class="card-title mb-3">Pilih Lokasi Pemantauan:</h5>
            <ul class="nav nav-pills justify-content-center" id="cityTabs">
                </ul>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-12">
            <div class="card ispu-card text-center text-white" id="statusCard" style="background-color: #6c757d;">
                <div class="card-body py-4">
                    <h4 class="mb-1">Prediksi Kualitas Udara Esok Hari</h4>
                    <h2 class="display-4 fw-bold mb-0" id="ispuValue">--</h2>
                    <h3 class="fw-bold text-uppercase mt-2" id="ispuStatus">Memuat Data...</h3>
                    <p class="mb-0 mt-2">Parameter Kritis: <span id="kritisValue" class="fw-bold">--</span></p>
                </div>
            </div>
        </div>
    </div>

    <div class="card ispu-card">
        <div class="card-body">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="card-title m-0">Tren Prediksi ISPU</h5>
                
                <div class="btn-group" role="group" aria-label="Filter Grafik">
                    <button type="button" class="btn btn-outline-primary" id="btn-24-jam" onclick="ubahFilterHari('24jam')">24 Jam Terakhir</button>
                    <button type="button" class="btn btn-outline-primary active" id="btn-7-hari" onclick="ubahFilterHari(7)">7 Hari Terakhir</button>
                    <button type="button" class="btn btn-outline-primary" id="btn-30-hari" onclick="ubahFilterHari(30)">30 Hari Terakhir</button>
                </div>
            </div>
            
            <canvas id="ispuChart" height="100"></canvas>
            
        </div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
