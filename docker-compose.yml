services:
  db:
    image: postgres:15-alpine
    container_name: ispu_postgres
    restart: always
    environment:
      POSTGRES_USER: ispu_admin
      POSTGRES_PASSWORD: rahasia_ispu
      POSTGRES_DB: ispu_jatim_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: